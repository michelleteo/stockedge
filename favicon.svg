<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1A1714"/>
  <rect width="32" height="32" rx="7" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#7A6230"/>
    </linearGradient>
  </defs>
  <!-- Tiny candlestick chart - 3 bars -->
  <rect x="6" y="14" width="3" height="10" rx="1" fill="#C9A84C" opacity="0.9"/>
  <rect x="6" y="11" width="1.2" height="3" rx="0.5" fill="#C9A84C" opacity="0.6"/>
  <rect x="7.4" y="20" width="1.2" height="4" rx="0.5" fill="#C9A84C" opacity="0.6"/>

  <rect x="11" y="9" width="3" height="15" rx="1" fill="#C9A84C"/>
  <rect x="11" y="6" width="1.2" height="3" rx="0.5" fill="#C9A84C" opacity="0.6"/>
  <rect x="12.4" y="24" width="1.2" height="2" rx="0.5" fill="#C9A84C" opacity="0.6"/>

  <rect x="16" y="12" width="3" height="11" rx="1" fill="#5CC994" opacity="0.9"/>
  <rect x="16" y="9" width="1.2" height="3" rx="0.5" fill="#5CC994" opacity="0.6"/>
  <rect x="17.4" y="23" width="1.2" height="3" rx="0.5" fill="#5CC994" opacity="0.6"/>

  <rect x="21" y="7" width="3" height="16" rx="1" fill="#5CC994"/>
  <rect x="21" y="4" width="1.2" height="3" rx="0.5" fill="#5CC994" opacity="0.6"/>
  <rect x="22.4" y="23" width="1.2" height="3" rx="0.5" fill="#5CC994" opacity="0.6"/>

  <!-- Upward trend line -->
  <polyline points="7.5,21 12.5,16 17.5,19 22.5,10" stroke="#C9A84C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>